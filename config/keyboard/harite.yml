    # Middle (columns 16-18)
      [17,1], [16,2], [18,2], [17,3],   # Right middle
    # Ring (columns 19-21)
      [20,1], [19,2], [21,2], [20,3],   # Right ring
    # Pinky (columns 22-24)
      [23,1], [22,2], [24,2], [23,3]]   # Right pinky

    # Thumb clusters (sequential numbering)
    - [[2,4],  [3,4],  [4,4],  [5,4],            # Left thumb cluster
      [20,4], [21,4], [22,4], [23,4]]           # Right thumb cluster

  hands:
    # Main key rows (rows 1-3)
